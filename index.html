<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Exames</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #F7F8FA;
    --card: #FFFFFF;
    --primary: #1A6B4A;
    --primary-light: #E8F5EE;
    --text: #1A1F2E;
    --gray: #7A8394;
    --border: #E8EBF0;
    --ok: #16A34A;
    --ok-bg: #DCFCE7;
    --warn: #D97706;
    --warn-bg: #FEF3C7;
    --bad: #DC2626;
    --bad-bg: #FEE2E2;
    --shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  .logo-text { font-weight: 700; font-size: 1.1rem; color: var(--text); }
  .logo-sub { font-size: .72rem; color: var(--gray); margin-top: 1px; }

  /* ── MAIN ── */
  .main { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

  /* ── UPLOAD ── */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--card);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 24px;
  }
  .upload-area:hover, .upload-area.drag { border-color: var(--primary); background: var(--primary-light); }
  .upload-icon { font-size: 2.5rem; margin-bottom: 12px; }
  .upload-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; }
  .upload-sub { color: var(--gray); font-size: .85rem; }
  .upload-btn {
    display: inline-block;
    margin-top: 16px;
    background: var(--primary);
    color: #fff;
    padding: 10px 24px;
    border-radius: 8px;
    font-weight: 600;
    font-size: .9rem;
    cursor: pointer;
    transition: opacity .2s;
  }
  .upload-btn:hover { opacity: .85; }
  #file-input { display: none; }

  /* ── HISTORICO ── */
  .hist-bar {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 20px; flex-wrap: wrap;
  }
  .hist-label { font-size: .78rem; font-weight: 700; color: var(--gray); letter-spacing: .5px; }
  .hist-chip {
    padding: 5px 12px;
    border-radius: 99px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Mono', monospace;
  }
  .hist-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .hist-chip:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

  /* ── SCORE ── */
  .score-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .score-circle {
    width: 72px; height: 72px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-weight: 800;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .score-circle small { font-size: .6rem; font-weight: 500; margin-top: -2px; }
  .score-info { flex: 1; }
  .score-title { font-weight: 700; font-size: 1rem; margin-bottom: 6px; }
  .score-pills { display: flex; gap: 8px; flex-wrap: wrap; }
  .pill {
    padding: 3px 10px;
    border-radius: 99px;
    font-size: .75rem;
    font-weight: 700;
  }
  .pill-ok { background: var(--ok-bg); color: var(--ok); }
  .pill-warn { background: var(--warn-bg); color: var(--warn); }
  .pill-bad { background: var(--bad-bg); color: var(--bad); }

  /* ── SEÇÃO ── */
  .section { margin-bottom: 28px; }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .section-icon { font-size: 1.3rem; }
  .section-title { font-weight: 700; font-size: .95rem; flex: 1; }
  .section-badge {
    font-size: .72rem; font-weight: 700;
    padding: 2px 8px; border-radius: 99px;
  }
  .section-toggle { color: var(--gray); font-size: .8rem; }

  /* ── GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 10px;
  }
  @media(max-width: 500px) { .cards-grid { grid-template-columns: 1fr 1fr; } }

  /* ── CARD ── */
  .exam-card {
    background: var(--card);
    border-radius: 12px;
    border: 1.5px solid var(--border);
    padding: 12px 14px;
    box-shadow: var(--shadow);
    position: relative;
  }
  .exam-card.ok { border-color: #BBF7D0; background: #F0FDF4; }
  .exam-card.warn { border-color: #FDE68A; background: #FFFBEB; }
  .exam-card.bad { border-color: #FECACA; background: #FFF5F5; }

  .exam-name {
    font-size: .75rem; font-weight: 700;
    color: var(--gray);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .exam-value {
    font-size: 1.5rem; font-weight: 800; line-height: 1.1;
    margin-bottom: 2px;
  }
  .exam-unit { font-size: .68rem; font-weight: 400; color: var(--gray); margin-left: 3px; }
  .exam-ref { font-size: .67rem; color: var(--gray); margin-bottom: 6px; }
  .exam-status {
    font-size: .65rem; font-weight: 700;
    padding: 2px 7px; border-radius: 99px;
    position: absolute; top: 10px; right: 10px;
  }

  /* Barra de referência */
  .bar-wrap {
    height: 6px; border-radius: 99px;
    background: linear-gradient(90deg, #22C55E 0%, #22C55E 40%, #F59E0B 60%, #EF4444 100%);
    position: relative; margin: 4px 0 6px;
  }
  .bar-marker {
    width: 12px; height: 12px;
    border-radius: 50%;
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    border: 2px solid #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }

  /* Mini chart */
  .mini-chart { height: 80px; margin-top: 8px; }

  /* ── LOADING ── */
  .loading {
    text-align: center; padding: 48px;
    color: var(--gray);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--text); color: #fff;
    padding: 12px 18px; border-radius: 10px;
    font-size: .85rem; font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,.25);
    z-index: 999;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }

  .empty {
    text-align: center; padding: 60px 20px;
    color: var(--gray);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; color: var(--text); }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 8px 0 16px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🩺</div>
    <div>
      <div class="logo-text">Meus Exames</div>
      <div class="logo-sub">Visualizador de resultados</div>
    </div>
  </div>
  <label class="upload-btn" for="file-input" style="margin:0;font-size:.82rem;padding:8px 16px">+ Carregar PDF</label>
</div>

<div class="main">

  <!-- Upload -->
  <div class="upload-area" id="drop-area" onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">📄</div>
    <div class="upload-title">Suba seu exame em PDF</div>
    <div class="upload-sub">O app lê automaticamente e exibe os resultados organizados</div>
    <div class="upload-btn">Escolher arquivo PDF</div>
  </div>
  <input type="file" id="file-input" accept=".pdf,application/pdf">

  <!-- Loading -->
  <div class="loading" id="loading" style="display:none">
    <div class="spinner"></div>
    <div>Lendo o PDF e extraindo os valores...</div>
  </div>

  <!-- Resultados -->
  <div id="resultados" style="display:none">

    <!-- Histórico de datas -->
    <div class="hist-bar" id="hist-bar">
      <span class="hist-label">DATAS:</span>
    </div>

    <!-- Score -->
    <div class="score-card" id="score-card"></div>

    <!-- Cards por sistema -->
    <div id="sistemas"></div>

  </div>

  <!-- Empty state inicial -->
  <div class="empty" id="empty-state">
    <div class="empty-icon">🔬</div>
    <div class="empty-title">Nenhum exame carregado</div>
    <div>Suba um PDF de exame laboratorial para começar</div>
  </div>

</div>

<script>
// ── PDF.js setup ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Estado global ──
var historico = JSON.parse(localStorage.getItem('exames_hist') || '[]');
var dataAtiva = null;

// ── Referências por exame ──
var REFS = {
  // Hemograma
  'hemoglobina':       { min:12,  max:16,   un:'g/dL' },
  'hematocrito':       { min:36,  max:46,   un:'%' },
  'hemacias':          { min:3.8, max:5.2,  un:'milhões/mm³' },
  'leucocitos':        { min:4500,max:11000, un:'/mm³' },
  'plaquetas':         { min:150000,max:400000, un:'/mm³' },
  'neutrofilos':       { min:1800,max:7700,  un:'/mm³' },
  'linfocitos':        { min:1000,max:4500,  un:'/mm³' },
  'monocitos':         { min:200, max:1000,  un:'/mm³' },
  'eosinofilos':       { min:50,  max:500,   un:'/mm³' },
  'basofilos':         { min:0,   max:100,   un:'/mm³' },
  'rdw':               { min:11.5,max:14.5,  un:'%' },
  'vgm':               { min:80,  max:100,   un:'fL' },
  'hgm':               { min:27,  max:33,    un:'pg' },
  'chgm':              { min:31,  max:36,    un:'%' },
  'vpm':               { min:7.5, max:12.5,  un:'fL' },
  'segmentados':       { min:1800,max:7700,  un:'/mm³' },
  // Bioquímica
  'glicose':           { min:70,  max:99,    un:'mg/dL' },
  'glicemia':          { min:70,  max:99,    un:'mg/dL' },
  'hemoglobina glicada':{ min:0,  max:5.7,   un:'%' },
  'hba1c':             { min:0,   max:5.7,   un:'%' },
  'ureia':             { min:15,  max:40,    un:'mg/dL' },
  'creatinina':        { min:0.6, max:1.2,   un:'mg/dL' },
  'acido urico':       { min:2.4, max:6.0,   un:'mg/dL' },
  'colesterol total':  { min:0,   max:190,   un:'mg/dL' },
  'hdl':               { min:50,  max:999,   un:'mg/dL' },
  'ldl':               { min:0,   max:130,   un:'mg/dL' },
  'vldl':              { min:0,   max:30,    un:'mg/dL' },
  'triglicerideos':    { min:0,   max:150,   un:'mg/dL' },
  'tgo':               { min:0,   max:40,    un:'U/L' },
  'tgp':               { min:0,   max:41,    un:'U/L' },
  'ast':               { min:0,   max:40,    un:'U/L' },
  'alt':               { min:0,   max:41,    un:'U/L' },
  'ggt':               { min:0,   max:61,    un:'U/L' },
  'fosfatase alcalina': { min:30, max:120,   un:'U/L' },
  'bilirrubina total': { min:0,   max:1.2,   un:'mg/dL' },
  'proteinas totais':  { min:6.0, max:8.0,   un:'g/dL' },
  'albumina':          { min:3.5, max:5.0,   un:'g/dL' },
  'sodio':             { min:136, max:145,   un:'mEq/L' },
  'potassio':          { min:3.5, max:5.0,   un:'mEq/L' },
  'calcio':            { min:8.5, max:10.5,  un:'mg/dL' },
  'magnesio':          { min:1.7, max:2.2,   un:'mg/dL' },
  'fosforo':           { min:2.5, max:4.5,   un:'mg/dL' },
  'ferro':             { min:60,  max:170,   un:'µg/dL' },
  'ferritina':         { min:12,  max:150,   un:'ng/mL' },
  // Hormônios
  'tsh':               { min:0.4, max:4.0,   un:'mUI/L' },
  't4 livre':          { min:0.8, max:1.9,   un:'ng/dL' },
  't3 livre':          { min:2.3, max:4.2,   un:'pg/mL' },
  'insulina':          { min:2.0, max:25.0,  un:'µUI/mL' },
  'vitamina d':        { min:30,  max:100,   un:'ng/mL' },
  'vitamina b12':      { min:200, max:900,   un:'pg/mL' },
  'psa total':         { min:0,   max:4.0,   un:'ng/mL' },
  'testosterona total':{ min:300, max:1000,  un:'ng/dL' },
  'cortisol':          { min:6.2, max:19.4,  un:'µg/dL' },
  'lh':                { min:1.7, max:8.6,   un:'mUI/mL' },
  'fsh':               { min:1.5, max:12.4,  un:'mUI/mL' },
  'prolactina':        { min:2.0, max:18.0,  un:'ng/mL' },
  // Urina
  'ph urina':          { min:5.0, max:7.0,   un:'' },
  'densidade':         { min:1010,max:1025,  un:'' },
};

var SISTEMAS = [
  { id:'sangue',    label:'Sangue',           icon:'🩸', keys:['hemoglobina','hematocrito','hemacias','leucocitos','plaquetas','neutrofilos','segmentados','linfocitos','monocitos','eosinofilos','basofilos','rdw','vgm','hgm','chgm','vpm'] },
  { id:'coracao',   label:'Coração e Vasos',  icon:'❤️', keys:['colesterol total','hdl','ldl','vldl','triglicerideos'] },
  { id:'metabol',   label:'Metabolismo',      icon:'⚡', keys:['glicose','glicemia','hemoglobina glicada','hba1c','insulina'] },
  { id:'renal',     label:'Rins',             icon:'💧', keys:['ureia','creatinina','acido urico','sodio','potassio','calcio','magnesio','fosforo'] },
  { id:'hepatico',  label:'Fígado',           icon:'🫀', keys:['tgo','ast','tgp','alt','ggt','fosfatase alcalina','bilirrubina total','proteinas totais','albumina'] },
  { id:'hormonal',  label:'Hormônios',        icon:'🔬', keys:['tsh','t4 livre','t3 livre','testosterona total','lh','fsh','prolactina','cortisol','psa total'] },
  { id:'vitaminas', label:'Vitaminas e Ferro',icon:'✨', keys:['vitamina d','vitamina b12','ferro','ferritina'] },
  { id:'outros',    label:'Outros',           icon:'📋', keys:[] },
];

// ── Drag & drop ──
var dropArea = document.getElementById('drop-area');
dropArea.addEventListener('dragover', function(e){ e.preventDefault(); dropArea.classList.add('drag'); });
dropArea.addEventListener('dragleave', function(){ dropArea.classList.remove('drag'); });
dropArea.addEventListener('drop', function(e){
  e.preventDefault(); dropArea.classList.remove('drag');
  var f = e.dataTransfer.files[0];
  if (f && f.type === 'application/pdf') processarPDF(f);
});
document.getElementById('file-input').addEventListener('change', function(){
  if (this.files[0]) processarPDF(this.files[0]);
});

// ── Processar PDF ──
function processarPDF(file) {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('resultados').style.display = 'none';
  document.getElementById('drop-area').style.display = 'none';

  var reader = new FileReader();
  reader.onload = function(e) {
    var typedArray = new Uint8Array(e.target.result);
    pdfjsLib.getDocument(typedArray).promise.then(function(pdf) {
      var pages = [];
      var total = pdf.numPages;
      for (var i=1;i<=total;i++) pages.push(i);
      var texts = [];
      var done = 0;
      pages.forEach(function(pn) {
        pdf.getPage(pn).then(function(page) {
          page.getTextContent().then(function(tc) {
            texts.push({ pn: pn, text: tc.items.map(function(i){ return i.str; }).join(' ') });
            done++;
            if (done === total) {
              texts.sort(function(a,b){ return a.pn-b.pn; });
              var textoCompleto = texts.map(function(t){ return t.text; }).join('\n');
              var exames = extrairExames(textoCompleto);
              var data = detectarData(textoCompleto);
              salvarEExibir(exames, data, file.name);
            }
          });
        });
      });
    }).catch(function(err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('drop-area').style.display = 'block';
      mostrarToast('Erro ao ler PDF: ' + err.message);
    });
  };
  reader.readAsArrayBuffer(file);
}

// ── Detectar data do exame ──
function detectarData(texto) {
  var m = texto.match(/(\d{2})[\/\-\.](\d{2})[\/\-\.](\d{4})/);
  if (m) return m[3]+'-'+m[2]+'-'+m[1];
  return new Date().toISOString().split('T')[0];
}

// ── Extrair exames do texto ──
function extrairExames(texto) {
  var exames = {};
  var linhas = texto.split(/[\n\r]+/);

  // Padrões comuns em laudos brasileiros
  var padroes = [
    // "Nome do exame: valor unidade Ref: min-max"
    /([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ\s\(\)\.]{2,40})[:\s]+([0-9]+[,\.]?[0-9]*)\s*([a-zA-Z\/µ%²³]*)\s*(?:[Rr]ef(?:er[eê]ncia)?\.?:?\s*([0-9]+[,\.]?[0-9]*)\s*[-–a]\s*([0-9]+[,\.]?[0-9]*))?/,
  ];

  linhas.forEach(function(linha) {
    linha = linha.trim();
    if (linha.length < 5) return;

    // Tenta encontrar nome + valor na linha
    var m = linha.match(/^([A-Za-zÀ-ÿ][A-Za-zÀ-ÿ\s\(\)\.\/]{1,45}?)\s*[:\s]\s*([0-9]+[,\.]?[0-9]*)\s*([a-zA-Z\/µ%²³]{0,10})/);
    if (!m) return;

    var nome = m[1].trim().toLowerCase()
      .replace(/[^a-zA-ZÀ-ÿ\s]/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();

    var valorStr = m[2].replace(',','.');
    var valor = parseFloat(valorStr);
    var unidade = m[3] || '';

    if (isNaN(valor) || valor <= 0) return;
    if (nome.length < 3) return;

    // Ignora linhas que são claramente não-exames
    var ignorar = ['pagina','page','data','hora','resultado','laudo','laboratorio','paciente','medico','crm','solicitante','material','metodo'];
    if (ignorar.some(function(ig){ return nome.indexOf(ig) >= 0; })) return;

    // Tenta pegar referência na mesma linha
    var minRef = null, maxRef = null;
    var refMatch = linha.match(/[Rr]ef(?:er[eê]ncia)?\.?:?\s*([0-9]+[,\.]?[0-9]*)\s*[-–a]\s*([0-9]+[,\.]?[0-9]*)/);
    if (refMatch) {
      minRef = parseFloat(refMatch[1].replace(',','.'));
      maxRef = parseFloat(refMatch[2].replace(',','.'));
    }

    // Busca referência no dicionário se não encontrou
    var refConhecida = buscarRef(nome);

    exames[nome] = {
      nome: m[1].trim(),
      valor: valor,
      unidade: unidade || (refConhecida ? refConhecida.un : ''),
      min: minRef !== null ? minRef : (refConhecida ? refConhecida.min : null),
      max: maxRef !== null ? maxRef : (refConhecida ? refConhecida.max : null),
    };
  });

  return exames;
}

function buscarRef(nome) {
  // Busca exata
  if (REFS[nome]) return REFS[nome];
  // Busca parcial
  var keys = Object.keys(REFS);
  for (var i=0;i<keys.length;i++) {
    if (nome.indexOf(keys[i]) >= 0 || keys[i].indexOf(nome) >= 0) return REFS[keys[i]];
  }
  return null;
}

// ── Salvar e exibir ──
function salvarEExibir(exames, data, nomeArq) {
  if (Object.keys(exames).length === 0) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('drop-area').style.display = 'block';
    mostrarToast('Não encontrei exames neste PDF. Tente outro arquivo.');
    return;
  }

  // Verifica se já existe essa data
  var idx = historico.findIndex(function(h){ return h.data === data; });
  if (idx >= 0) {
    // Mescla — novos dados sobrescrevem
    Object.assign(historico[idx].exames, exames);
  } else {
    historico.push({ data: data, nomeArq: nomeArq, exames: exames });
    historico.sort(function(a,b){ return a.data > b.data ? 1 : -1; });
  }

  localStorage.setItem('exames_hist', JSON.stringify(historico));
  dataAtiva = data;

  document.getElementById('loading').style.display = 'none';
  mostrarToast('✅ ' + Object.keys(exames).length + ' exames carregados!');
  renderizar();
}

// ── Renderizar ──
function renderizar() {
  if (!historico.length) {
    document.getElementById('resultados').style.display = 'none';
    document.getElementById('empty-state').style.display = 'block';
    return;
  }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('resultados').style.display = 'block';
  document.getElementById('drop-area').style.display = 'none';

  if (!dataAtiva) dataAtiva = historico[historico.length-1].data;

  renderHistBar();
  renderScore();
  renderSistemas();
}

function renderHistBar() {
  var bar = document.getElementById('hist-bar');
  bar.innerHTML = '<span class="hist-label">DATAS:</span>';
  historico.forEach(function(h) {
    var chip = document.createElement('span');
    chip.className = 'hist-chip' + (h.data === dataAtiva ? ' active' : '');
    chip.textContent = formatarData(h.data);
    chip.onclick = function() { dataAtiva = h.data; renderizar(); };
    bar.appendChild(chip);
  });
  // Botão limpar
  var btnLimpar = document.createElement('span');
  btnLimpar.className = 'hist-chip';
  btnLimpar.style.cssText = 'color:#DC2626;border-color:#FECACA;margin-left:auto';
  btnLimpar.textContent = '🗑 Limpar tudo';
  btnLimpar.onclick = function() {
    if (confirm('Apagar todo o histórico?')) {
      historico = []; dataAtiva = null;
      localStorage.removeItem('exames_hist');
      document.getElementById('resultados').style.display = 'none';
      document.getElementById('empty-state').style.display = 'block';
      document.getElementById('drop-area').style.display = 'block';
    }
  };
  bar.appendChild(btnLimpar);
}

function renderScore() {
  var entrada = historico.find(function(h){ return h.data === dataAtiva; });
  if (!entrada) return;
  var exames = entrada.exames;
  var total = 0, ok = 0, warn = 0, bad = 0;

  Object.values(exames).forEach(function(e) {
    if (e.min === null || e.max === null) return;
    total++;
    var s = status(e.valor, e.min, e.max);
    if (s === 'ok') ok++;
    else if (s === 'warn') warn++;
    else bad++;
  });

  var pct = total > 0 ? Math.round((ok / total) * 100) : 0;
  var cor = pct >= 80 ? '#16A34A' : pct >= 60 ? '#D97706' : '#DC2626';
  var bgCor = pct >= 80 ? '#DCFCE7' : pct >= 60 ? '#FEF3C7' : '#FEE2E2';

  document.getElementById('score-card').innerHTML =
    '<div class="score-circle" style="background:'+bgCor+';color:'+cor+'">' +
    pct + '<small>%</small>' +
    '</div>' +
    '<div class="score-info">' +
    '<div class="score-title">Resultado geral — ' + formatarData(dataAtiva) + '</div>' +
    '<div class="score-pills">' +
    (ok   ? '<span class="pill pill-ok">✅ '+ok+' normais</span>' : '') +
    (warn ? '<span class="pill pill-warn">⚠️ '+warn+' atenção</span>' : '') +
    (bad  ? '<span class="pill pill-bad">🔴 '+bad+' alterados</span>' : '') +
    '<span class="pill" style="background:#F1F5F9;color:#475569">'+total+' avaliados</span>' +
    '</div></div>';
}

function renderSistemas() {
  var entrada = historico.find(function(h){ return h.data === dataAtiva; });
  if (!entrada) return;
  var exames = entrada.exames;
  var wrap = document.getElementById('sistemas');
  wrap.innerHTML = '';

  // Distribui exames nos sistemas
  var distribuidos = {};
  var nomesExames = Object.keys(exames);

  nomesExames.forEach(function(nomeKey) {
    var sistemaId = 'outros';
    for (var i=0;i<SISTEMAS.length-1;i++) {
      var sys = SISTEMAS[i];
      for (var j=0;j<sys.keys.length;j++) {
        if (nomeKey.indexOf(sys.keys[j]) >= 0 || sys.keys[j].indexOf(nomeKey) >= 0) {
          sistemaId = sys.id; break;
        }
      }
      if (sistemaId !== 'outros') break;
    }
    if (!distribuidos[sistemaId]) distribuidos[sistemaId] = [];
    distribuidos[sistemaId].push(nomeKey);
  });

  SISTEMAS.forEach(function(sys) {
    var items = distribuidos[sys.id] || [];
    if (!items.length) return;

    var badCount = items.filter(function(k){
      var e = exames[k];
      return e.min !== null && e.max !== null && status(e.valor,e.min,e.max) === 'bad';
    }).length;
    var warnCount = items.filter(function(k){
      var e = exames[k];
      return e.min !== null && e.max !== null && status(e.valor,e.min,e.max) === 'warn';
    }).length;

    var badgeCor = badCount ? '#DC2626' : warnCount ? '#D97706' : '#16A34A';
    var badgeBg  = badCount ? '#FEE2E2' : warnCount ? '#FEF3C7' : '#DCFCE7';
    var badgeLabel = badCount ? badCount+' alterado'+(badCount>1?'s':'') : warnCount ? warnCount+' atenção' : 'Normal';

    var sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + sys.id;

    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML =
      '<span class="section-icon">'+sys.icon+'</span>' +
      '<span class="section-title">'+sys.label+'</span>' +
      '<span class="section-badge" style="background:'+badgeBg+';color:'+badgeCor+'">'+badgeLabel+'</span>' +
      '<span class="section-toggle">▾</span>';

    var body = document.createElement('div');
    body.className = 'cards-grid';
    body.id = 'body-' + sys.id;

    var aberto = true;
    header.onclick = function() {
      aberto = !aberto;
      body.style.display = aberto ? 'grid' : 'none';
      header.querySelector('.section-toggle').textContent = aberto ? '▾' : '▸';
    };

    items.forEach(function(nomeKey) {
      var e = exames[nomeKey];
      var s = (e.min !== null && e.max !== null) ? status(e.valor, e.min, e.max) : 'neutro';
      var pos = (e.min !== null && e.max !== null) ? calcPos(e.valor, e.min, e.max) : 50;
      var corMarker = s === 'ok' ? '#16A34A' : s === 'warn' ? '#D97706' : '#DC2626';

      // Histórico para minigráfico
      var hist = historico.map(function(h) {
        var ex = h.exames[nomeKey];
        return ex ? { data: h.data, valor: ex.valor } : null;
      }).filter(Boolean);

      var chartId = 'chart_' + nomeKey.replace(/[^a-z0-9]/g,'_');

      var card = document.createElement('div');
      card.className = 'exam-card ' + s;

      var statusLabel = s === 'ok' ? 'Normal' : s === 'warn' ? 'Atenção' : s === 'bad' ? 'Alterado' : '';
      var statusCor = s === 'ok' ? 'var(--ok)' : s === 'warn' ? 'var(--warn)' : s === 'bad' ? 'var(--bad)' : 'var(--gray)';
      var statusBg = s === 'ok' ? 'var(--ok-bg)' : s === 'warn' ? 'var(--warn-bg)' : s === 'bad' ? 'var(--bad-bg)' : 'var(--border)';

      card.innerHTML =
        (statusLabel ? '<span class="exam-status" style="background:'+statusBg+';color:'+statusCor+'">'+statusLabel+'</span>' : '') +
        '<div class="exam-name">' + e.nome + '</div>' +
        '<div class="exam-value" style="color:'+corMarker+'">' + formatNum(e.valor) + '<span class="exam-unit">' + (e.unidade||'') + '</span></div>' +
        (e.min !== null ? '<div class="exam-ref">Ref: '+formatNum(e.min)+' – '+formatNum(e.max)+(e.unidade?' '+e.unidade:'')+'</div>' : '<div class="exam-ref">Sem referência</div>') +
        (e.min !== null ? '<div class="bar-wrap"><div class="bar-marker" style="left:'+pos+'%;background:'+corMarker+'"></div></div>' : '') +
        (hist.length >= 2 ? '<div class="mini-chart"><canvas id="'+chartId+'"></canvas></div>' : '');

      body.appendChild(card);

      // Renderiza gráfico após inserir no DOM
      if (hist.length >= 2) {
        setTimeout(function(cid, ch, cor) {
          var el = document.getElementById(cid);
          if (!el) return;
          var labels = ch.map(function(h){ return formatarData(h.data); });
          var vals = ch.map(function(h){ return h.valor; });
          var r = parseInt(cor.slice(1,3),16)||22;
          var g = parseInt(cor.slice(3,5),16)||163;
          var b = parseInt(cor.slice(5,7),16)||74;
          new Chart(el, {
            type: 'line',
            data: { labels: labels, datasets: [{
              data: vals,
              borderColor: cor,
              backgroundColor: 'rgba('+r+','+g+','+b+',0.12)',
              borderWidth: 2,
              pointRadius: 3,
              pointBackgroundColor: cor,
              tension: 0.3,
              fill: true,
              spanGaps: true
            }]},
            options: {
              responsive: true, maintainAspectRatio: false,
              animation: { duration: 400 },
              plugins: { legend: { display: false } },
              scales: { x: { display: false }, y: { display: false } }
            }
          });
        }, 80, chartId, hist, corMarker);
      }
    });

    sec.appendChild(header);
    sec.appendChild(body);
    wrap.appendChild(sec);
  });
}

// ── Helpers ──
function status(v, min, max) {
  if (min === null || max === null) return 'neutro';
  var range = max - min;
  if (v >= min && v <= max) return 'ok';
  var dist = v < min ? (min - v) / range : (v - max) / range;
  return dist < 0.25 ? 'warn' : 'bad';
}

function calcPos(v, min, max) {
  var range = max - min;
  var ext = range * 0.5;
  var total = range + ext * 2;
  var pos = ((v - (min - ext)) / total) * 100;
  return Math.max(2, Math.min(98, pos));
}

function formatNum(v) {
  if (v === null || v === undefined) return '—';
  if (v >= 1000) return v.toLocaleString('pt-BR');
  return parseFloat(v.toFixed(2)).toString().replace('.',',');
}

function formatarData(data) {
  if (!data) return '';
  var p = data.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

function mostrarToast(msg) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 3000);
}

// ── Inicializar com histórico existente ──
if (historico.length) {
  dataAtiva = historico[historico.length-1].data;
  renderizar();
}
</script>
</body>
